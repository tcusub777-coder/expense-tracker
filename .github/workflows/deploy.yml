name: Deploy to EC2

on:
  push:
    branches:
      - main

job:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secerts.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t tijabo/expense-tracker:latest .

      - name: Push Docker Image
        RUN: docker push tijabo/expense-tracker:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:

      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{secerts.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            docker pull tijabo/expense-tracker:latest
            docker stop expense-tracker-con || true
            docker rm expense-tracker-con || true
            docker run -d -p  80:3000 --name expense-tracker-con tijabo/expense-tracker:latest

